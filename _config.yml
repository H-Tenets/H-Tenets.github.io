# 欢迎使用Jekyll！
#
# 此配置文件用于影响整个站点的设置，值
# 您应该设置一次，之后很少需要编辑。
# 由于技术原因，当您使用
# `jekyll serve -l -H localhost`时，此文件*不会*自动重新加载。如果您更改此文件，请重新启动
# 服务器进程。

# 基本站点设置
locale: "en-US"
site_theme: "default" # 可用的主题选项有"default"、"air"、"sunrise"、"mint"、"dirt"和"contrast"
title: "h-tenets"
title_separator: "-"
name: &name "王慧涛"
description: &description "个人描述" # 用站点的一般描述更新此内容，如果未被页面覆盖，则这是默认值
url:
  https://h-tenets.github.io # 站点的基础主机名和协议，例如"https://[您的GitHub用户名].github.io"，
  # 或者如果您已经在Github上托管了其他页面，则使用"https://[您的GitHub用户名].github.io/[您的仓库名称]"
baseurl: "" # 站点的子路径，例如"/blog"
repository: "h-tenets/h-tenets.github.io"

# 站点作者 - 以下控制作为侧边栏上作者内容的一部分显示的内容。
#               如果字段为空，则图标和链接不会出现，否则将显示。
#               可以通过编辑/_includes/author-profile.html进行其他自定义
author:
  # 个人信息
  avatar: "profile.png"
  name: "王慧涛"
  pronouns: # 例如: "she/her"
  bio: "左侧边栏的简短个人简介"
  location: "Earth"
  employer: "Red Brick University"
  uri: # URL
  email: "huitaowang@foxmail.com"

  # 学术网站
  academia: # URL
  arxiv: # URL - 更新为您的个人资料的正确链接
  googlescholar: "https://scholar.google.com/citations?user=PS_CX0AAAAAJ"
  inspire-hep: # URL
  impactstory: # URL
  orcid: "https://orcid.org/yourorcidurl"
  semantic: # URL
  ssrn: # URL
  pubmed: "https://www.ncbi.nlm.nih.gov/pubmed/?term=john+snow"
  researchgate: # URL
  scopus: # URL
  zotero: # URL

  # 代码仓库和软件开发
  bitbucket: # 用户名 - 更新为网站上的用户名
  codepen: # 用户名
  dribbble: # 用户名
  github: "academicpages"
  kaggle: # 用户名
  stackoverflow: # 用户编号或用户编号和名称（即，使用"1"或"1/jeff-atwood"）

  # 社交媒体
  artstation: # 用户名
  bluesky: "bsky.app" # 替换为您的Bluesky用户名
  facebook: # 用户名
  flickr: # 用户名
  foursquare: # 用户名
  goodreads: # 用户名
  google_plus: # 用户名
  keybase: # 用户名
  instagram: # 用户名
  lastfm: # 用户名
  linkedin: # 用户名
  mastodon: # URL
  medium: # URL
  pinterest: # 用户名
  soundcloud: # 用户名
  steam: # 用户名
  telegram: # URL
  tumblr: # 用户名
  twitter: # X/Twitter的用户名
  vine: # 用户名
  weibo: # 用户名
  wikipedia: # 用户名
  xing: # 用户名
  youtube: # 用户名
  zhihu: # 用户名

# 出版物类别 - 以下是出版物类别及其标题的列表
publication_category:
  books:
    title: "Books"
  manuscripts:
    title: "Journal Articles"
  conferences:
    title: "Conference Papers"

# 站点设置
teaser: # 放置在/images/中的社交媒体预览的预告图片的文件名
breadcrumbs: false # true, false（默认）
words_per_minute: 160
future: true
read_more: "disabled" # 如果启用，则在摘录中添加"阅读更多"链接
talkmap_link: false # 更改为true以在演讲页面上添加演讲地图链接
comments:
  provider: # false（默认），"disqus"，"discourse"，"facebook"，"google-plus"，"staticman"，"custom"
  disqus:
    shortname:
  discourse:
    server: # https://meta.discourse.org/t/embedding-discourse-comments-via-javascript/31963，例如：meta.discourse.org
  facebook:
    appid:
    num_posts: # 5（默认）
    colorscheme: # "light"（默认），"dark"
staticman:
  allowedFields: ["name", "email", "url", "message"]
  branch: "gh-pages" # "master"，"gh-pages"
  commitMessage: "New comment."
  filename: comment-{@timestamp}
  format: "yml"
  moderation: true
  path: "_data/comments/{options.slug}"
  requiredFields: ["name", "email", "message"]
  transforms:
    email: "md5"
  generatedFields:
    date:
      type: "date"
      options:
        format: "iso8601" # "iso8601"（默认），"timestamp-seconds"，"timestamp-milliseconds"
atom_feed:
  hide: false # 更改为true以在页脚中隐藏RSS feed
  path: # 空白（默认）使用feed.xml

# SEO相关
google_site_verification:
bing_site_verification:
alexa_site_verification:
yandex_site_verification:

# 社交分享
twitter:
  username: &twitter
facebook:
  username:
  app_id:
  publisher:
og_image: # 社交媒体默认站点图片
og_description: # 社交媒体默认站点图片描述
# 用于指定社交资料
# - https://developers.google.com/structured-data/customize/social-profiles
social:
  type: # Person或Organization（默认为Person）
  name: # 如果用户或组织名称与站点名称不同
  links: # 社交媒体资料链接的数组

# 分析
analytics:
  provider: "false" # false（默认），"google"，"google-universal"，"google-analytics-4"，"custom"
  google:
    tracking_id:

# 读取文件
include:
  - .htaccess
  - _pages
  - files
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - .asset-cache
  - .bundle
  - .github
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/_main.js
  - assets/js/plugins
  - assets/js/vendor
  - CHANGELOG
  - Capfile
  - config
  - Dockerfile
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - local
  - log
  - node_modules
  - package.json*
  - Rakefile
  - README
  - tmp
  - vendor
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# 转换
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

# Markdown处理
kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false

# 这些设置控制模板使用的集合类型
collections:
  teaching:
    output: true
    permalink: /:collection/:path/
  publications:
    output: true
    permalink: /:collection/:path/
  portfolio:
    output: true
    permalink: /:collection/:path/
  talks:
    output: true
    permalink: /:collection/:path/

# 这些设置控制页面和集合如何包含在站点中
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true
      share: true
      related: true
  # _pages
  - scope:
      path: ""
      type: pages
    values:
      layout: single
      author_profile: true
  # _teaching
  - scope:
      path: ""
      type: teaching
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # _publications
  - scope:
      path: ""
      type: publications
    values:
      layout: single
      author_profile: true
      share: true
      comments: true
  # _portfolio
  - scope:
      path: ""
      type: portfolio
    values:
      layout: single
      author_profile: true
      share: true
      comment: true
  # _talks
  - scope:
      path: ""
      type: talks
    values:
      layout: talk
      author_profile: true
      share: true

# Sass/SCSS
sass:
  sass_dir: _sass
  style: compressed # https://sass-lang.com/documentation/file.SASS_REFERENCE.html#output_style

# 输出
permalink: /:categories/:title/
# paginate: 5 # 显示的文章数量
# paginate_path: /page:num/
timezone: Etc/UTC # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

# 插件
plugins:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# 使用--safe模拟GitHub Pages
whitelist:
  - jekyll-feed
  - jekyll-gist
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-redirect-from
  - jemoji

# 归档
# 类型
# - 使用Liquid构建的GitHub Pages兼容归档页面 ~> type: liquid（默认）
# - Jekyll Archives插件归档页面 ~> type: jekyll-archives
# 路径（示例）
# - 当使用Liquid方法时，归档页面应该存在于路径中，否则您可以
#    预期链接会损坏（尤其是在启用面包屑的情况下）
# - <base_path>/tags/my-awesome-tag/index.html ~> path: /tags/
# - <base_path/categories/my-awesome-category/index.html ~> path: /categories/
# - <base_path/my-awesome-category/index.html ~> path: /
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/
# https://github.com/jekyll/jekyll-archives
# jekyll-archives:
#   enabled:
#     - categories
#     - tags
#   layouts:
#     category: archive-taxonomy
#     tag: archive-taxonomy
#   permalinks:
#     category: /categories/:name/
#     tag: /tags/:name/

# HTML压缩
# - https://jch.penibelst.de/
compress_html:
  clippings: all
  ignore:
    envs: development
